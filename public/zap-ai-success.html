<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZAP AI Pro — Pagamento Confirmado!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #111b21;
      color: #e9edef;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #1f2c33;
      border-radius: 16px;
      padding: 40px;
      max-width: 420px;
      border: 1px solid #3b4a54;
    }
    .check { font-size: 64px; margin-bottom: 16px; }
    h1 { color: #00a884; font-size: 24px; margin-bottom: 8px; }
    p { color: #8696a0; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
    .btn {
      display: inline-block;
      background: #00a884;
      color: white;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: background 0.2s;
    }
    .btn:hover { background: #008f72; }
    .steps {
      text-align: left;
      background: #2a3942;
      border-radius: 10px;
      padding: 16px;
      margin: 20px 0;
      font-size: 13px;
    }
    .steps li { margin: 8px 0; color: #e9edef; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>Pagamento Confirmado!</h1>
    <p>Seu plano <strong>ZAP AI Pro</strong> foi ativado com sucesso.</p>

    <div class="steps">
      <ol>
        <li>Volte para o WhatsApp Web</li>
        <li>Abra o painel do <strong>ZAP AI</strong></li>
        <li>Clique em <strong>"Já paguei — Ativar Pro"</strong></li>
        <li>Pronto! Transcrições ilimitadas + IA liberadas 🎉</li>
      </ol>
    </div>

    <a href="https://web.whatsapp.com" class="btn">🚀 Ir para WhatsApp Web</a>
  </div>
</body>
</html>
