<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Feliz Aniversário de Namoro ❤️</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(135deg, #1a0020 0%, #2d0040 25%, #1a0030 50%, #0d0015 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow-x: hidden;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    /* ───── Floating hearts ───── */
    .hearts-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .heart {
      position: absolute;
      bottom: -50px;
      animation: floatUp var(--duration) var(--delay) ease-in infinite;
      opacity: 0;
    }

    .heart::before {
      content: attr(data-emoji);
      font-size: var(--size);
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg) scale(0); opacity: 0; }
      10%  { opacity: var(--opacity); transform: translateY(-10vh) rotate(10deg) scale(1); }
      50%  { opacity: var(--opacity); transform: translateY(-50vh) rotate(-15deg) scale(1.1); }
      90%  { opacity: var(--opacity); }
      100% { transform: translateY(-110vh) rotate(20deg) scale(0.3); opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 20px rgba(255, 100, 150, 0.5), 0 0 40px rgba(255, 100, 150, 0.3); }
      50% { text-shadow: 0 0 30px rgba(255, 100, 150, 0.8), 0 0 60px rgba(255, 100, 150, 0.5), 0 0 80px rgba(255, 100, 150, 0.3); }
    }

    /* ───── Content ───── */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 24px;
      max-width: 380px;
      width: 100%;
    }

    .title {
      font-size: 42px;
      animation: glow 3s ease-in-out infinite, fadeInUp 1s ease-out;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 20px rgba(255, 100, 150, 0.4));
    }

    .subtitle {
      color: #e8a0c0;
      font-size: 18px;
      letter-spacing: 2px;
      animation: fadeInUp 1s ease-out 0.3s both;
      margin-bottom: 4px;
    }

    .date {
      color: #c07090;
      font-size: 14px;
      font-style: italic;
      animation: fadeInUp 1s ease-out 0.5s both;
      margin-bottom: 24px;
    }

    .message {
      color: #e0c0d0;
      font-size: 15px;
      line-height: 1.7;
      animation: fadeInUp 1s ease-out 0.7s both;
      margin-bottom: 28px;
      padding: 0 8px;
    }

    .message em {
      color: #ff8faa;
      font-style: normal;
    }

    /* ───── Counter ───── */
    .counter {
      animation: fadeInUp 1s ease-out 0.9s both;
      margin-bottom: 28px;
    }

    .counter-box {
      display: inline-flex;
      gap: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 150, 180, 0.15);
      border-radius: 16px;
      padding: 16px 24px;
    }

    .counter-item {
      text-align: center;
      min-width: 48px;
    }

    .counter-num {
      font-size: 28px;
      font-weight: bold;
      color: #ff8faa;
      line-height: 1;
    }

    .counter-label {
      font-size: 10px;
      color: #c080a0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .counter-divider {
      color: rgba(255, 150, 180, 0.3);
      font-size: 24px;
      line-height: 28px;
    }

    /* ───── Gallery ───── */
    .gallery-title {
      color: #e8a0c0;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: fadeInUp 1s ease-out 1.0s both;
      margin-bottom: 12px;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      animation: fadeInUp 1s ease-out 1.1s both;
      margin-bottom: 28px;
    }

    .gallery-item {
      aspect-ratio: 1;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(255, 150, 180, 0.2);
      background: linear-gradient(135deg, rgba(255,100,150,0.15), rgba(200,50,100,0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      transition: transform 0.3s, border-color 0.3s;
    }

    .gallery-item:active {
      transform: scale(0.95);
      border-color: rgba(255, 150, 180, 0.5);
    }

    .gallery-item.add-photo {
      cursor: pointer;
      border-style: dashed;
      font-size: 32px;
      color: rgba(255, 150, 180, 0.3);
    }

    /* ───── Quote ───── */
    .quote {
      color: #d0a0b8;
      font-size: 13px;
      font-style: italic;
      line-height: 1.6;
      animation: fadeInUp 1s ease-out 1.2s both;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    /* ───── Sparkles ───── */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 5;
      animation: sparkleFade 1.5s ease-out forwards;
    }

    @keyframes sparkleFade {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
    }

    /* ───── Tap hint ───── */
    .tap-hint {
      color: rgba(255, 180, 200, 0.4);
      font-size: 11px;
      animation: fadeInUp 1s ease-out 1.5s both;
      letter-spacing: 1px;
    }

    .closing {
      color: #ff8faa;
      font-size: 24px;
      font-weight: bold;
      animation: fadeInUp 1s ease-out 1.2s both, glow 3s ease-in-out infinite;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div class="hearts-container" id="hearts"></div>

<div class="content">
  <div class="title">❤️</div>
  <div class="subtitle">Feliz Aniversário de Namoro</div>
  <div class="date" id="dateDisplay"></div>

  <p class="message">
    Cada momento ao seu lado é um capítulo que eu <em>não quero que acabe</em>.
    Você transforma dias comuns em memórias que guardo com carinho.
    <br><br>
    <em>Obrigado por ser você.</em>
  </p>

  <div class="counter">
    <div class="counter-box">
      <div class="counter-item">
        <div class="counter-num" id="days">—</div>
        <div class="counter-label">dias</div>
      </div>
      <div class="counter-divider">·</div>
      <div class="counter-item">
        <div class="counter-num" id="months">—</div>
        <div class="counter-label">meses</div>
      </div>
    </div>
  </div>

  <div class="gallery-title">Nossos Momentos</div>
  <div class="gallery" id="gallery">
    <div class="gallery-item" style="background-image:url('/namorada/01.jpg');background-size:cover;background-position:center"></div>
    <div class="gallery-item" style="background-image:url('/namorada/02.jpg');background-size:cover;background-position:center"></div>
    <div class="gallery-item" style="background-image:url('/namorada/03.jpg');background-size:cover;background-position:center"></div>
    <div class="gallery-item" style="background-image:url('/namorada/04.jpg');background-size:cover;background-position:center"></div>
    <div class="gallery-item" style="background-image:url('/namorada/05.jpg');background-size:cover;background-position:center"></div>
    <div class="gallery-item" style="background-image:url('/namorada/06.jpg');background-size:cover;background-position:center"></div>
    <div class="gallery-item" style="background-image:url('/namorada/07.jpg');background-size:cover;background-position:center"></div>
    <div class="gallery-item" style="background-image:url('/namorada/08.jpg');background-size:cover;background-position:center"></div>
  </div>

  <p class="closing">Eu te Vivo 🤍</p>
</div>

<script>
  // ── Hearts ──
  const heartsEl = document.getElementById('hearts');
  const emojis = ['❤️', '💕', '💗', '💖', '💘', '💝', '💞', '💓', '✨', '💐', '🫶'];

  function spawnHeart(x, y) {
    const el = document.createElement('div');
    el.className = 'heart';
    el.dataset.emoji = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.setProperty('--size', (14 + Math.random() * 22) + 'px');
    el.style.setProperty('--duration', (3 + Math.random() * 5) + 's');
    el.style.setProperty('--delay', (Math.random() * 2) + 's');
    el.style.setProperty('--opacity', (0.4 + Math.random() * 0.4));
    el.style.left = (x ?? Math.random() * 100) + '%';
    heartsEl.appendChild(el);
    setTimeout(() => el.remove(), 8000);
  }

  // Auto-spawn hearts
  for (let i = 0; i < 12; i++) {
    setTimeout(() => spawnHeart(Math.random() * 100), i * 400);
  }
  setInterval(() => spawnHeart(Math.random() * 100), 2000);

  // ── Sparkles on tap ──
  document.addEventListener('click', (e) => {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.textContent = '💖';
    sparkle.style.left = e.clientX + 'px';
    sparkle.style.top = e.clientY + 'px';
    sparkle.style.fontSize = (20 + Math.random() * 30) + 'px';
    document.body.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 1500);

    // Also spawn hearts on tap
    for (let i = 0; i < 3; i++) {
      const hx = ((e.clientX / window.innerWidth) * 100) + (Math.random() - 0.5) * 20;
      spawnHeart(hx, e.clientY / window.innerHeight * 100);
    }
  });

  // ── Counter ──
  // CHANGE THIS DATE to your anniversary:
  const startDate = new Date('2024-05-17T00:00:00');

  function updateCounter() {
    const now = new Date();
    const diff = now - startDate;
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const months = Math.floor(days / 30.44);

    document.getElementById('days').textContent = days;
    document.getElementById('months').textContent = months;
  }
  updateCounter();

  // ── Date display ──
  const opts = { year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('dateDisplay').textContent =
    'desde ' + startDate.toLocaleDateString('pt-BR', opts);

  // ── Gallery click ──
  document.querySelectorAll('.gallery-item').forEach(item => {
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      if (this.classList.contains('add-photo')) {
        alert('Peça pro Vinícius adicionar suas fotos aqui! 📸');
      }
    });
  });
</script>
</body>
</html>
